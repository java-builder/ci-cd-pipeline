services:
  mysql:
    image: mysql:lts
    container_name: mysql
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: banking_db
    volumes:
      - banking_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.2.4
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_banking:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  banking_data:
  redis_banking: