name: Continuous Integration Pipeline (Maven Build, Test, Package, Docker)
run-name: ${{ github.actor }}
on:
  push:
    branches:
      - master
      - main

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'maven'

      - name: Run tests (Unit Test & Integration Test)
        run: mvn test

      - name: SonarCloud Analysis
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          pollingTimeoutSec: 600
        env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
            SONAR_HOST_URL: https://sonarcloud.io

      - name: Build with Maven
        run: mvn package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ secrets.DOCKER_USERNAME }}/backend-service:${{ github.sha }}

      - name: Run Trivy vulnerability scanner  (Docker image)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: 'image'
          format: 'table'
          image-ref: 'docker.io/${{ secrets.DOCKER_USERNAME }}/backend-service:${{ github.sha }}'
          trivy-config: trivy.yml

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend-service:${{ github.sha }}
